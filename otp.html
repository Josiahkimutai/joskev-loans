<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OTP Verification - Joskev Loans</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0056d2,#003f9e);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    text-align:center;
}

.icon{
    width:90px;
    height:90px;
    background:#eef4ff;
    color:#0056d2;
    font-size:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 20px;
}

h1{ color:#0056d2; }

p{ color:#666; margin-bottom:20px; }

.phone{ color:#16c47f; font-weight:bold; }

.input-box{
    margin-bottom:15px;
    text-align:left;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.message{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div class="icon">🔐</div>

<h1>Verify Your Account</h1>

<p>
Enter OTP sent to<br>
<span class="phone" id="phoneText"></span>
</p>

<div class="input-box">
<input type="text" id="otp" placeholder="OTP Code">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Create Password">
</div>

<div class="input-box">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
</div>

<button onclick="verifyDetails()">Verify & Continue</button>

<div class="message" id="message"></div>

</div>

<script>
/* SHOW PHONE */
const phone = localStorage.getItem("phone");
document.getElementById("phoneText").innerText = phone || "Not found";

/* SUPABASE */
const supabaseUrl = "https://iuzacikghsrvmvlfspgd.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1emFjaWtnaHNydm12bGZzcGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzExOTIsImV4cCI6MjA5NjQwNzE5Mn0.3IThzg9nUmnzDWUM_Dv7JmIKBO61PHb7O8lcL1tpTUU"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* VERIFY */
async function verifyDetails(){

    let otp = document.getElementById("otp").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let message = document.getElementById("message");

    if(!phone){
        message.innerHTML = "❌ Phone not found";
        return;
    }

    if(otp !== "123456"){
        message.innerHTML = "❌ Incorrect OTP";
        return;
    }

    if(password.length < 6){
        message.innerHTML = "❌ Password too short";
        return;
    }

    if(password !== confirmPassword){
        message.innerHTML = "❌ Passwords do not match";
        return;
    }

    /* UPDATE SUPABASE */
    const { error } = await supabaseClient
        .from("applications")
        .update({
            password: password,
            is_verified: true
        })
        .eq("phone", phone);

    if(error){
        console.log(error);
        message.innerHTML = "❌ Failed to save data";
        return;
    }

    message.innerHTML = "✅ Verified Successfully";

    /* FIXED LOADING REDIRECT */
    setTimeout(() => {
        window.location.href = "loading.html";
    }, 2000);
}
</script>

</body>
</html>
