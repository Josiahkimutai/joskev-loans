<style>
*{

body{
    background:linear-gradient(135deg,#0056d2,#003f9e);

    align-items:center;

.card{
    width:100%;
    max-width:450px;
    background:white;
    padding:40px;

.input-box input{

button{
    width:100%;

    border:none;

    margin-top:15px;

<body>

<div class="card">

<div class="icon">🔐</div>

<h1>Verify Your Account</h1>

<p>
Enter OTP sent to<br>
<span class="phone" id="phoneText"></span>
</p>

<div class="input-box">
<input type="text" id="otp" placeholder="OTP Code">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Create Password">
</div>

<div class="input-box">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
</div>

<button onclick="verifyDetails()">Verify & Continue</button>

<div class="message" id="message"></div>

</div>
<script>

/* GET PHONE */
const phone = localStorage.getItem("phone");

/* SHOW PHONE */
document.getElementById("phoneText").innerText =
    phone || "Phone not found";

/* SUPABASE */
const supabaseUrl = "https://iuzacikghsrvmvlfspgd.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1emFjaWtnaHNydm12bGZzcGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzExOTIsImV4cCI6MjA5NjQwNzE5Mn0.3IThzg9nUmnzDWUM_Dv7JmIKBO61PHb7O8lcL1tpTUU";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

/* REPLACE YOUR OLD FUNCTION WITH THIS */
async function verifyDetails() {

    const enteredOtp = document.getElementById("otp").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    const message = document.getElementById("message");

    const savedOtp = localStorage.getItem("otp");

    try {

        if (!phone) {
            message.innerHTML = "❌ Phone number not found";
            return;
        }

        if (!enteredOtp) {
            message.innerHTML = "❌ Enter OTP code";
            return;
        }

        if (enteredOtp !== savedOtp) {
            message.innerHTML = "❌ Invalid OTP";
            return;
        }

        if (password.length < 6) {
            message.innerHTML = "❌ Password must be at least 6 characters";
            return;
        }

        if (password !== confirmPassword) {
            message.innerHTML = "❌ Passwords do not match";
            return;
        }

        message.innerHTML = "⏳ Verifying...";

        const { error: updateError } = await supabaseClient
            .from("applications")
            .update({
                password: password,
                is_verified: true
            })
            .eq("phone", phone);

        if (updateError) {
            console.error(updateError);
            message.innerHTML = "❌ Failed to update account";
            return;
        }

        localStorage.removeItem("otp");

        message.innerHTML = "✅ Verified Successfully";

        setTimeout(() => {
            window.location.href = "loading.html";
        }, 2000);

    } catch (err) {

        console.error(err);
        message.innerHTML = "❌ " + err.message;

    }
}

</script>
