<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Receipt - Joskev Loans</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* (ALL YOUR CSS STAYS THE SAME) */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#eef5ff,#f8fbff);
    padding:20px;
}

.card{
    width:100%;
    max-width:480px;
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.12);
    text-align:center;
    position:relative;
}

.icon{
    width:90px;
    height:90px;
    margin:0 auto;
    border-radius:50%;
    background:linear-gradient(135deg,#16c47f,#0ea85f);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    color:white;
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{transform:scale(0.3);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

h1{
    margin-top:15px;
    font-size:22px;
    color:#0f172a;
}

.status{
    color:#16c47f;
    font-weight:700;
    margin-bottom:15px;
}

.qr-box{
    margin:15px auto;
    padding:15px;
    background:#f8fbff;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    width:160px;
    height:160px;
    border:1px solid #dbeafe;
}

.info{
    text-align:left;
    margin-top:15px;
    background:#f8fbff;
    padding:15px;
    border-radius:16px;
    border:1px solid #dbeafe;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #e5edf8;
    font-size:14px;
}

.row:last-child{border:none;}

.label{
    color:#64748b;
    font-weight:600;
}

.value{
    font-weight:700;
    color:#0f172a;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
}

.continue-btn{
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
}

.download-btn{
    background:linear-gradient(135deg,#16c47f,#0ea85f);
    color:white;
}

.small{
    margin-top:12px;
    font-size:12px;
    color:#64748b;
}
</style>
</head>

<body>

<div class="card">

    <div class="icon">✔</div>

    <h1>Payment Successful</h1>
    <div class="status">M-PESA CONFIRMED</div>

    <div class="qr-box">
        <div id="qrcode"></div>
    </div>

    <div class="info">
        <div class="row"><div class="label">Name</div><div class="value" id="name"></div></div>
        <div class="row"><div class="label">Phone</div><div class="value" id="phone"></div></div>
        <div class="row"><div class="label">Amount</div><div class="value" id="amount"></div></div>
        <div class="row"><div class="label">Receipt</div><div class="value" id="receipt"></div></div>
        <div class="row"><div class="label">Date</div><div class="value" id="date"></div></div>
    </div>

    <!-- ✅ FIXED BUTTON -->
    <button class="btn continue-btn" onclick="window.location.href='welcome.html'">
        Continue
    </button>

    <button class="btn download-btn" onclick="downloadPDF()">Download PDF</button>

    <div class="small">Secure fintech-grade receipt • Verified by Joskev Loans</div>

</div>

<script>
const name = localStorage.getItem("firstName") || "Customer";
const phone = localStorage.getItem("phone") || "N/A";
const receipt = localStorage.getItem("mpesaReceipt") || "N/A";
const amount = localStorage.getItem("paidAmount") || "1";
const date = localStorage.getItem("paymentDate") || new Date().toLocaleString();

document.getElementById("name").innerText = name;
document.getElementById("phone").innerText = phone;
document.getElementById("amount").innerText = "KES " + amount;
document.getElementById("receipt").innerText = receipt;
document.getElementById("date").innerText = date;

new QRCode(document.getElementById("qrcode"), {
    text: `Joskev Receipt\nName:${name}\nPhone:${phone}\nAmount:${amount}\nReceipt:${receipt}\nDate:${date}`,
    width: 130,
    height: 130
});

window.onload = () => {
    confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 }
    });
};

function generateReceiptId(phone, amount, mpesaReceipt, date){
    const raw = `${phone}|${amount}|${mpesaReceipt}|${date}`;
    let hash = 0;
    for (let i = 0; i < raw.length; i++) {
        hash = (hash * 31 + raw.charCodeAt(i)) >>> 0;
    }
    return "QH" + hash.toString(36).toUpperCase().substring(0, 10);
}

function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const name = localStorage.getItem("firstName") || "Customer";
    const phone = localStorage.getItem("phone") || "N/A";
    const amount = localStorage.getItem("paidAmount") || "1";
    const mpesaReceipt = localStorage.getItem("mpesaReceipt") || "N/A";
    const date = localStorage.getItem("paymentDate") || new Date().toLocaleString();

    const receiptId = generateReceiptId(phone, amount, mpesaReceipt, date);

    doc.text("Receipt generated successfully", 20, 20);
    doc.save(`RECEIPT_${receiptId}.pdf`);
}
</script>

</body>
</html>
