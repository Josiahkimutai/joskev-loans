<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Status - Joskev Loans</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f8ff;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    color:#0056d2;
    text-align:center;
    margin-bottom:30px;
}

.loan-box{
    background:#eef4ff;
    border-radius:15px;
    padding:25px;
    margin-bottom:20px;
}

.loan-box h2{
    color:#0056d2;
    margin-bottom:15px;
}

.info{
    margin-bottom:12px;
    font-size:16px;
}

.label{
    font-weight:bold;
    color:#444;
}

.status{
    display:inline-block;
    padding:10px 18px;
    border-radius:30px;
    font-weight:bold;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.approved{
    background:#d4edda;
    color:#155724;
}

.rejected{
    background:#f8d7da;
    color:#721c24;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 22px;
    border-radius:10px;
    color:white;
    background:#0056d2;
}

.btn:hover{
    opacity:.9;
}

.btn-secondary{
    background:#666;
}

@media(max-width:600px){

.buttons{
    flex-direction:column;
}

.btn{
    text-align:center;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Loan Status</h1>

<div class="loan-box">

<h2>Current Loan Application</h2>

<div class="info">
<span class="label">Customer Name:</span>
<span id="customerName">Loading...</span>
</div>

<div class="info">
<span class="label">Phone Number:</span>
<span id="phone">Loading...</span>
</div>

<div class="info">
<span class="label">Loan Amount:</span>
KES <span id="amount">0</span>
</div>

<div class="info">
<span class="label">Application Date:</span>
<span id="dateApplied"></span>
</div>

<div class="info">
<span class="label">Loan Status:</span>
<span class="status pending" id="loanStatus">
Pending Review
</span>
</div>

</div>

<div class="buttons">

<a href="dashboard.html" class="btn">
🏠 Dashboard
</a>

<a href="nextpage.html" class="btn">
💰 Apply For Another Loan
</a>

<a href="support.html" class="btn btn-secondary">
📞 Contact Support
</a>

</div>

</div>

</div>

<script>

/* LOAD DATA */

const firstName =
localStorage.getItem("firstName") || "Customer";

const phone =
localStorage.getItem("phone") || "Not Available";

const amount =
localStorage.getItem("amount") || "0";

/* DISPLAY DATA */

document.getElementById("customerName").innerText =
firstName;

document.getElementById("phone").innerText =
phone;

document.getElementById("amount").innerText =
Number(amount).toLocaleString();

/* DATE */

const today = new Date();

document.getElementById("dateApplied").innerText =
today.toLocaleDateString();

/* LOAN STATUS */

const status =
localStorage.getItem("loanStatus") || "Pending Review";

document.getElementById("loanStatus").innerText =
status;

</script>

</body>
</html>
