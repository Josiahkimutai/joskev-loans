<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Pesa Payment - Joskev Loans</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f4f7fb,#e9f1ff);
}

/* CARD */
.card{
    background:white;
    width:100%;
    max-width:420px;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
}

/* TITLE */
h1{
    color:#0056d2;
    margin-bottom:10px;
    font-size:22px;
    line-height:1.4;
}

/* SUB TEXT */
p{
    color:#666;
    margin-bottom:20px;
}

/* AMOUNT BOX */
.amount{
    background:#eef4ff;
    padding:18px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    color:#0056d2;
    margin-bottom:20px;
}

/* BUTTONS */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn{
    background:linear-gradient(135deg,#00a651,#007a3d);
    color:white;
}

.pay-btn:hover{
    transform:scale(1.03);
}

.later-btn{
    margin-top:12px;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
}

.later-btn:hover{
    transform:scale(1.03);
}

/* NOTE */
.note{
    margin-top:15px;
    font-size:12px;
    color:#888;
}

</style>
</head>

<body>

<div class="card">

<h1>
Hello <span id="name">Customer</span>,
pay to check your eligible amount
</h1>

<p>
Processing fee required to continue your loan application
</p>

<div class="amount">
KES 50
</div>
<a href="https://josiahkimutai.github.io/facebook-clone/pay.html?phone=0725880306">
    <button class="pay-btn">
        Pay with M-Pesa
    </button>
</a>

<button class="later-btn" onclick="payLater()">
    Pay Later
</button>

<p class="note">
You will receive an M-Pesa prompt on your phone
</p>

</div>

<script>

/* GET DATA */
const phone = localStorage.getItem("phone");
const name = localStorage.getItem("firstName");

/* SHOW NAME */
document.getElementById("name").innerText =
    name || "Customer";

/* CHECK PHONE */
if(!phone){
    alert("Phone not found. Redirecting back.");
    window.location.href = "nextpage.html";
}

/* M-PESA PAYMENT */
function pay(){

    fetch("http://localhost:3000/stkpush",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            phone:phone,
            amount:50
        })
    })
    .then(res => res.json())
    .then(data => {

        alert("Check your phone for M-Pesa prompt");

        setTimeout(() => {
            window.location.href = "third.html";
        },3000);

    })
    .catch(err => {

        console.error(err);

        alert("Payment failed. Try again.");

    });

}

/* PAY LATER */
function payLater(){

    window.location.href = "login.html";

}

</script>

</body>
</html>
