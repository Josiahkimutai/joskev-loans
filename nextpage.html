<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Application - Joskev Loans</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    width:100%;
    background:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#0056d2;
}

.back-btn{
    text-decoration:none;
    background:#0056d2;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    transition:0.3s;
    font-size:15px;
}

.back-btn:hover{
    background:#003f9e;
}

/* CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* CARD */
.card{
    width:100%;
    max-width:800px;
    background:white;
    border-radius:22px;
    padding:45px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TITLE */
.card h1{
    text-align:center;
    color:#0056d2;
    margin-bottom:10px;
    font-size:38px;
}

.card p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

/* SUCCESS MESSAGE */
.success-message{
    background:#e8fff1;
    color:#12a150;
    border:1px solid #b7f3cd;
    padding:16px;
    border-radius:12px;
    text-align:center;
    margin-bottom:20px;
    display:none;
    font-weight:bold;
    font-size:16px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

/* INPUTS */
.input-box{
    display:flex;
    flex-direction:column;
}

.input-box label{
    margin-bottom:8px;
    color:#444;
    font-size:14px;
    font-weight:600;
}

.input-box input,
.input-box select,
.input-box textarea{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:#fafafa;
    transition:0.3s;
}

.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus{
    border-color:#0056d2;
    background:white;
    box-shadow:0 0 8px rgba(0,86,210,0.15);
}

.full{
    grid-column:1 / -1;
}

/* BUTTON */
button{
    width:100%;
    margin-top:25px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* INFO BOX */
.info{
    margin-top:25px;
    background:#eef4ff;
    padding:20px;
    border-radius:14px;
    line-height:1.8;
    color:#555;
    font-size:14px;
}

/* LOADER */
.loader{
    width:20px;
    height:20px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid white;
    border-radius:50%;
    display:inline-block;
    animation:spin 1s linear infinite;
    vertical-align:middle;
    margin-right:10px;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* MOBILE */
@media(max-width:700px){

.grid{
    grid-template-columns:1fr;
}

.card{
    padding:30px 20px;
}

.card h1{
    font-size:30px;
}

header{
    flex-direction:column;
    gap:15px;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">
Joskev Loans
</div>

<a href="index.html" class="back-btn">
← Back Home
</a>

</header>

<!-- CONTAINER -->
<div class="container">

<div class="card">

<h1>Loan Application</h1>

<p>
Fill in your details to continue
</p>

<!-- SUCCESS -->
<div class="success-message" id="successMessage">
✅ Application Submitted Successfully
</div>

<!-- FORM -->
<form id="loanForm">

<div class="grid">

<!-- FIRST NAME -->
<div class="input-box">
<label>First Name *</label>
<input type="text" id="firstName" required>
</div>

<!-- LAST NAME -->
<div class="input-box">
<label>Last Name *</label>
<input type="text" id="lastName" required>
</div>

<!-- PHONE -->
<div class="input-box">
<label>Phone Number *</label>
<input type="tel" id="phone" placeholder="07XXXXXXXX" required>
</div>

<!-- EMAIL -->
<div class="input-box">
<label>Email Address *</label>
<input type="email" id="email" required>
</div>

<!-- DOB -->
<div class="input-box">
<label>Date of Birth *</label>
<input type="date" id="dob" required>
</div>

<!-- ID -->
<div class="input-box">
<label>ID Number *</label>
<input type="number" id="idNumber" required>
</div>

<!-- EMPLOYMENT -->
<div class="input-box">
<label>Employment Status *</label>

<select id="employment" required>
<option value="">Select</option>
<option>Employed</option>
<option>Self Employed</option>
<option>Business Owner</option>
<option>Student</option>
<option>Other</option>
</select>

</div>

<!-- INCOME -->
<div class="input-box">
<label>Monthly Income *</label>

<select id="income" required>
<option value="">Select Income</option>
<option value="5000">KES 5,000 - 10,000</option>
<option value="10000">KES 10,000 - 30,000</option>
<option value="30000">KES 30,000 - 50,000</option>
<option value="50000">KES 50,000+</option>
</select>

</div>

<!-- LOAN AMOUNT -->
<div class="input-box">
<label>Loan Amount *</label>

<select id="amount" required>
<option value="">Select Amount</option>
<option value="1000">KES 1,000</option>
<option value="5000">KES 5,000</option>
<option value="10000">KES 10,000</option>
<option value="20000">KES 20,000</option>
<option value="50000">KES 50,000</option>
<option value="100000">KES 100,000</option>
<option value="200000">KES 200,000</option>
</select>

</div>

<!-- PURPOSE -->
<div class="input-box full">
<label>Reason For Loan *</label>
<textarea id="purpose" rows="4" required></textarea>
</div>

</div>

<button type="submit" id="submitBtn">
Submit Loan Application
</button>

</form>

<!-- INFO -->
<div class="info">

✔ Fast approval within 15 minutes<br>
✔ Money sent directly to M-Pesa<br>
✔ Secure & confidential process<br>
✔ Flexible repayment options available

</div>

</div>

</div>
<script>

/* SUPABASE CONFIG */

const supabaseUrl = "https://iuzacikghsrvmvlfspgd.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1emFjaWtnaHNydm12bGZzcGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzExOTIsImV4cCI6MjA5NjQwNzE5Mn0.3IThzg9nUmnzDWUM_Dv7JmIKBO61PHb7O8lcL1tpTUU";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

/* FORM SUBMIT */

document.getElementById("loanForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");

    submitBtn.disabled = true;
    submitBtn.innerHTML = "Checking details...";

    /* GET VALUES */

    let firstName = document.getElementById("firstName").value.trim();
    let lastName = document.getElementById("lastName").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let dob = document.getElementById("dob").value;
    let idNumber = document.getElementById("idNumber").value.trim();
    let employment = document.getElementById("employment").value;
    let income = document.getElementById("income").value;
    let amount = document.getElementById("amount").value;
    let purpose = document.getElementById("purpose").value.trim();

    /* FORMAT KENYAN PHONE */

    if (phone.startsWith("0")) {
        phone = "+254" + phone.substring(1);
    }

    if (phone.startsWith("254")) {
        phone = "+" + phone;
    }

    /* CHECK PHONE */

    const { data: phoneData } = await supabaseClient
        .from("applications")
        .select("phone")
        .eq("phone", phone);

    if (phoneData && phoneData.length > 0) {

        alert("Phone Number Already Exists");

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Loan Application";

        return;
    }

    /* CHECK EMAIL */

    const { data: emailData } = await supabaseClient
        .from("applications")
        .select("email")
        .eq("email", email);

    if (emailData && emailData.length > 0) {

        alert("Email Already Exists");

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Loan Application";

        return;
    }

    /* CHECK ID */

    const { data: idData } = await supabaseClient
        .from("applications")
        .select("id_number")
        .eq("id_number", idNumber);

    if (idData && idData.length > 0) {

        alert("ID Number Already Exists");

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Loan Application";

        return;
    }

    /* SAVE TO LOCAL STORAGE */

    localStorage.setItem("firstName", firstName);
    localStorage.setItem("phone", phone);
    localStorage.setItem("amount", amount);

    /* GENERATE LOCAL OTP */

    const otp = Math.floor(
        100000 + Math.random() * 900000
    ).toString();

    localStorage.setItem("otp", otp);

    /* SHOW OTP FOR TESTING */

    alert("Your OTP is: " + otp);

    /* INSERT APPLICATION */

    const { error } = await supabaseClient
        .from("applications")
        .insert([
            {
                first_name: firstName,
                last_name: lastName,
                phone: phone,
                email: email,
                dob: dob,
                id_number: idNumber,
                employment: employment,
                income: income,
                amount: amount,
                purpose: purpose,
                is_verified: false
            }
        ]);

    if (error) {

        console.error(error);

        alert("Failed to submit application");

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Loan Application";

        return;
    }

    /* GO TO OTP PAGE */

    window.location.href = "otp.html";

});

</script>
<script>
const flow = [
  "index.html",
  "login.html",
  "dashboard.html",
  "pay.html",
  "loading.html",
  "receipt.html"
];

function getPageName() {
  return window.location.pathname.split("/").pop();
}

function enforceFlow(expectedIndex) {
  const current = getPageName();
  const allowed = flow[expectedIndex];

  if (current !== allowed) {
    window.location.href = allowed;
  }
}
</script>
</body>
</html>
