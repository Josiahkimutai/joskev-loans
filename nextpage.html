<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Application - Joskev Loans</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:linear-gradient(135deg,#e9f1ff,#f4f7fb);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    background:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#0056d2;
}

.back-btn{
    text-decoration:none;
    background:#0056d2;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    font-size:14px;
}

/* CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* CARD */
.card{
    width:100%;
    max-width:650px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* TITLE */
.card h1{
    text-align:center;
    color:#0056d2;
    margin-bottom:8px;
}

.card p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

/* GRID INPUTS */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* INPUT STYLE */
.input-box{
    margin-bottom:15px;
}

label{
    font-size:13px;
    color:#444;
    display:block;
    margin-bottom:6px;
}

input, select, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:0.3s;
    background:#fafafa;
}

input:focus, select:focus, textarea:focus{
    border-color:#0056d2;
    background:white;
}

/* FULL WIDTH */
.full{
    grid-column:1 / -1;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

/* INFO */
.info{
    margin-top:20px;
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    font-size:13px;
    color:#555;
}

/* MOBILE */
@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>
<div class="logo">Joskev Loans</div>
<a href="index.html" class="back-btn">← Back Home</a>
</header>

<div class="container">

<div class="card">

<h1>Loan Application</h1>
<p>Complete your details to get instant approval</p>

<form action="loading.html">

<div class="grid">

<div class="input-box">
<label>First Name *</label>
<input type="text" required>
</div>

<div class="input-box">
<label>Last Name *</label>
<input type="text" required>
</div>

<div class="input-box">
<label>Phone Number *</label>
<input type="tel" required>
</div>

<div class="input-box">
<label>Email *</label>
<input type="email" required>
</div>

<div class="input-box full">
<label>Date of Birth *</label>
<input type="date" required>
</div>

<div class="input-box">
<label>ID Number *</label>
<input type="number" required>
</div>

<div class="input-box">
<label>Employment *</label>
<select required>
<option value="">Select</option>
<option>Employed</option>
<option>Self Employed</option>
<option>Business Owner</option>
<option>Student</option>
</select>
</div>

<div class="input-box">
<label>Loan Amount *</label>
<select required>
<option value="">Select Amount</option>
<option>KES 1,000</option>
<option>KES 5,000</option>
<option>KES 10,000</option>
<option>KES 20,000</option>
<option>KES 50,000</option>
<option>KES 100,000</option>
</select>
</div>

<div class="input-box full">
<label>Reason for Loan</label>
<textarea rows="3"></textarea>
</div>

</div>

<button type="submit">Submit Application</button>

</form>

<div class="info">
✔ Fast approval within 15 minutes<br>
✔ Direct M-Pesa deposit<br>
✔ Secure & encrypted application
</div>

</div>

</div>

</body>
</html>
