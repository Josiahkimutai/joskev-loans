<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Application - Joskev Loans</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:linear-gradient(135deg,#e9f1ff,#f4f7fb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card{
    width:100%;
    max-width:700px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
h1{
    text-align:center;
    color:#0056d2;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* INPUT */
input, select, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

input:focus, select:focus{
    border-color:#0056d2;
}

/* FULL */
.full{
    grid-column:1 / -1;
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#0056d2;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#003f9e;
}

/* ERROR */
.error{
    color:red;
    font-size:13px;
    margin-top:5px;
}

/* MOBILE */
@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="card">

<h1>Loan Application</h1>
<p>All fields are required to continue</p>

<form id="loanForm" action="loading.html" method="GET">

<div class="grid">

<input type="text" id="firstName" placeholder="First Name">
<input type="text" id="lastName" placeholder="Last Name">

<input type="tel" id="phone" placeholder="07XXXXXXXX or 2547XXXXXXXX">
<input type="email" id="email" placeholder="Email Address">

<input type="number" id="idNumber" placeholder="ID Number">
<input type="date" id="dob">

<select id="employment">
<option value="">Employment Status</option>
<option>Employed</option>
<option>Self Employed</option>
<option>Business Owner</option>
<option>Student</option>
<option>Unemployed</option>
</select>

<input type="number" id="income" placeholder="Monthly Income (KES)">

<select id="amount">
<option value="">Loan Amount</option>
<option value="1000">KES 1,000</option>
<option value="5000">KES 5,000</option>
<option value="10000">KES 10,000</option>
<option value="20000">KES 20,000</option>
<option value="50000">KES 50,000</option>
<option value="100000">KES 100,000</option>
</select>

<textarea id="purpose" class="full" placeholder="Purpose of Loan"></textarea>

</div>

<button type="submit">Continue</button>

</form>

</div>

<script>

document.getElementById("loanForm").addEventListener("submit", function(e){

    let firstName = document.getElementById("firstName").value.trim();
    let lastName = document.getElementById("lastName").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let idNumber = document.getElementById("idNumber").value.trim();
    let dob = document.getElementById("dob").value;
    let employment = document.getElementById("employment").value;
    let income = document.getElementById("income").value;
    let amount = document.getElementById("amount").value;

    // PHONE VALIDATION
    let phonePattern = /^(07\d{8}|2547\d{8})$/;

    if(!firstName || !lastName || !phone || !email || !idNumber || !dob || !employment || !income || !amount){
        alert("⚠ Please fill ALL fields before continuing.");
        e.preventDefault();
        return;
    }

    if(!phonePattern.test(phone)){
        alert("⚠ Enter a valid Kenyan number (07XXXXXXXX or 2547XXXXXXXX)");
        e.preventDefault();
        return;
    }

    if(income < 1000){
        alert("⚠ Monthly income must be at least KES 1,000");
        e.preventDefault();
        return;
    }

    // SAVE DATA
    localStorage.setItem("firstName", firstName);
    localStorage.setItem("phone", phone);
    localStorage.setItem("amount", amount);
    localStorage.setItem("employment", employment);
    localStorage.setItem("income", income);

});

</script>

</body>
</html>
