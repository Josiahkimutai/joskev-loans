<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Joskev Loans</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f8ff;
    min-height:100vh;
}

/* HEADER */

header{
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
    text-align:center;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

header h1{
    font-size:32px;
}

/* CONTAINER */

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

/* DASHBOARD CARD */

.dashboard-card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* WELCOME */

.welcome{
    text-align:center;
    margin-bottom:30px;
}

.welcome h2{
    color:#0056d2;
    margin-bottom:10px;
}

.welcome p{
    color:#666;
}

/* INFO GRID */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.info-box{
    background:#f8fbff;
    border:1px solid #e3ebff;
    border-radius:15px;
    padding:20px;
}

.info-box h3{
    color:#0056d2;
    font-size:15px;
    margin-bottom:8px;
}

.info-box p{
    color:#333;
    font-size:18px;
    font-weight:bold;
}

/* STATUS */

.status{
    display:inline-block;
    background:#fff3cd;
    color:#856404;
    padding:10px 18px;
    border-radius:30px;
    font-weight:bold;
}

/* BUTTONS */

.actions{
    margin-top:30px;
    text-align:center;
}

.btn{
    display:inline-block;
    padding:14px 25px;
    border:none;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

.apply-btn{
    background:#0056d2;
}

.logout-btn{
    background:#dc3545;
}

/* MOBILE */

@media(max-width:700px){

.grid{
    grid-template-columns:1fr;
}

header h1{
    font-size:26px;
}

}

</style>
</head>

<body>

<header>
    <h1>Joskev Loans Dashboard</h1>
</header>

<div class="container">

<div class="dashboard-card">

<div class="welcome">

<h2>
Welcome,
<span id="customerName">Customer</span>
</h2>

<p>
Manage your loan application below.
</p>

</div>

<div class="grid">

<div class="info-box">
<h3>Customer Name</h3>
<p id="name">Loading...</p>
</div>

<div class="info-box">
<h3>Phone Number</h3>
<p id="phone">Loading...</p>
</div>

<div class="info-box">
<h3>Loan Amount</h3>
<p id="amount">KES 0</p>
</div>

<div class="info-box">
<h3>Loan Status</h3>
<p>
<span class="status" id="status">
Pending Review
</span>
</p>
</div>

</div>

<div class="actions">

<a href="nextpage.html" class="btn apply-btn">
Apply For Another Loan
</a>

<button class="btn logout-btn" onclick="logout()">
Logout
</button>

</div>

</div>

</div>

<script>

/* CHECK LOGIN */

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}

/* LOAD USER DATA */

const customerName =
localStorage.getItem("userName") || "Customer";

const customerPhone =
localStorage.getItem("userPhone") || "Not Available";

const loanAmount =
localStorage.getItem("amount") || "0";

document.getElementById("customerName").innerText =
customerName;

document.getElementById("name").innerText =
customerName;

document.getElementById("phone").innerText =
customerPhone;

document.getElementById("amount").innerText =
"KES " + loanAmount;

/* LOGOUT */

function logout(){

    localStorage.clear();

    window.location.href = "login.html";
}

</script>

</body>
</html>
