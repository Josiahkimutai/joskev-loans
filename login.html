<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joskev Loans - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef4ff,#f9fbff);
    padding:20px;
}

.card{
    width:100%;
    max-width:390px;
    background:#fff;
    padding:35px;
    border-radius:22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
    text-align:center;
}

.logo-box{
    width:60px;
    height:60px;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#22c55e);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:24px;
    font-weight:700;
    margin:auto;
    box-shadow:0 10px 25px rgba(37,99,235,.25);
}

.logo-title{
    margin-top:10px;
    font-size:22px;
    font-weight:700;
    color:#2563eb;
}

.logo-sub{
    font-size:12px;
    color:#6b7280;
    margin-bottom:22px;
}

h2{
    color:#111827;
    font-size:24px;
    margin-bottom:5px;
}

.welcome{
    color:#6b7280;
    font-size:13px;
    margin-bottom:20px;
}

.phone{
    display:flex;
    border:1px solid #e5e7eb;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:12px;
    background:#fff;
}

.prefix{
    background:#f3f4f6;
    padding:12px;
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:600;
    color:#111827;
    border-right:1px solid #e5e7eb;
    min-width:95px;
    justify-content:center;
}

.phone input{
    flex:1;
    border:none;
    outline:none;
    padding:12px;
    font-size:14px;
    background:transparent;
}

.password{
    width:100%;
    padding:12px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    outline:none;
    margin-bottom:10px;
    font-size:14px;
}

.password:focus,
.phone:focus-within{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.08);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    margin-bottom:16px;
    color:#6b7280;
}

.options a{
    color:#2563eb;
    text-decoration:none;
    font-weight:500;
}

.login-btn{
    width:100%;
    border:none;
    padding:13px;
    border-radius:12px;
    background:linear-gradient(90deg,#2563eb,#22c55e);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    font-size:15px;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.2);
}

.login-btn:disabled{
    opacity:.7;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

.or{
    margin:18px 0 14px;
    color:#9ca3af;
    font-size:12px;
}

.social{
    display:flex;
    gap:10px;
}

.social button{
    flex:1;
    padding:11px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    transition:.3s;
    font-size:14px;
}

/* GOOGLE */
.google-btn{
    background:#fff;
    border:1px solid #dadce0;
    color:#3c4043;
    box-shadow:0 2px 8px rgba(0,0,0,.04);
}

.google-btn:hover{
    background:#f8f9fa;
    transform:translateY(-2px);
}

.google-logo{
    width:20px;
    height:20px;
    flex-shrink:0;
}

/* MPESA */
.mpesa-btn{
    background:linear-gradient(135deg,#00a651,#008f46);
    border:none;
    color:#fff;
    box-shadow:0 8px 18px rgba(0,166,81,.22);
}

.mpesa-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 24px rgba(0,166,81,.28);
}

.mpesa-logo{
    width:24px;
    height:24px;
    border-radius:50%;
    background:#fff;
    color:#00a651;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:700;
    flex-shrink:0;
}

.signup{
    margin-top:18px;
    font-size:12px;
    color:#6b7280;
}

.signup a{
    color:#2563eb;
    font-weight:600;
    text-decoration:none;
}

.message{
    margin-top:14px;
    font-size:13px;
    font-weight:600;
    min-height:20px;
}

.message.success{
    color:#16a34a;
}

.message.error{
    color:#dc2626;
}

.message.info{
    color:#2563eb;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo-box">J</div>

    <div class="logo-title">Joskev Loans</div>
    <div class="logo-sub">Your Financial Partner</div>

    <h2>Welcome Back 👋</h2>
    <div class="welcome">Login to your account to continue</div>

    <div class="phone">
        <div class="prefix">🇰🇪 +254</div>
        <input type="tel" placeholder="712 345 678" id="phone">
    </div>

    <input type="password" class="password" placeholder="Enter your password" id="password">

    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot Password?</a>
    </div>

    <button class="login-btn" id="loginBtn" onclick="loginUser()">
        🔒 Login
    </button>

    <div class="message" id="message"></div>

    <div class="or">or continue with</div>

    <div class="social">

        <!-- GOOGLE BUTTON -->
        <button class="google-btn" type="button">
            <svg class="google-logo" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.6-4.7 2.5-7.3 2.5-5.3 0-9.8-3.3-11.4-8l-6.6 5.1C9.3 39.6 16.1 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.2-3.4 5.6-6.3 7.2l6.3 5.3C39.7 36.8 44 31 44 24c0-1.3-.1-2.4-.4-3.5z"/>
            </svg>
            Google
        </button>

        <!-- MPESA BUTTON -->
        <button class="mpesa-btn" type="button">
            <span class="mpesa-logo">M</span>
            M-PESA
        </button>

    </div>

    <div class="signup">
        Don't have an account?
        <a href="nextpage.html">Apply Now →</a>
    </div>

</div>

<script>
const supabaseUrl = "https://iuzacikghsrvmvlfspgd.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1emFjaWtnaHNydm12bGZzcGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzExOTIsImV4cCI6MjA5NjQwNzE5Mn0.3IThzg9nUmnzDWUM_Dv7JmIKBO61PHb7O8lcL1tpTUU";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function formatKenyanPhone(phone) {
    phone = phone.replace(/\s+/g, "").trim();

    if (phone.startsWith("0")) {
        return "+254" + phone.substring(1);
    }

    if (phone.startsWith("254")) {
        return "+" + phone;
    }

    if (phone.startsWith("+254")) {
        return phone;
    }

    return phone;
}

async function loginUser() {
    const phoneInput = document.getElementById("phone").value;
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    const phone = formatKenyanPhone(phoneInput);

    if (!phone || !password) {
        message.className = "message error";
        message.innerHTML = "❌ Please enter phone number and password";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = "Checking...";
    message.className = "message info";
    message.innerHTML = "Checking account...";

    try {
        // 1. Check if phone exists
        const { data: userData, error: userError } = await supabaseClient
            .from("applications")
            .select("*")
            .eq("phone", phone)
            .eq("is_verified", true)
            .single();

        if (userError || !userData) {
            message.className = "message error";
            message.innerHTML = "❌ You are not registered or account is not verified";
            loginBtn.disabled = false;
            loginBtn.innerHTML = "🔒 Login";
            return;
        }

        // 2. Check password
        if (userData.password !== password) {
            message.className = "message error";
            message.innerHTML = "❌ Wrong password";
            loginBtn.disabled = false;
            loginBtn.innerHTML = "🔒 Login";
            return;
        }

        // 3. Save session data for dashboard
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("userPhone", userData.phone || phone);
        localStorage.setItem("userName", userData.first_name || "Customer");
        localStorage.setItem("amount", userData.amount || "0");

        message.className = "message success";
        message.innerHTML = "✅ Login successful";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 900);

    } catch (err) {
        message.className = "message error";
        message.innerHTML = "❌ Something went wrong. Try again.";
        console.error(err);
        loginBtn.disabled = false;
        loginBtn.innerHTML = "🔒 Login";
    }
}

// Optional: press Enter to login
document.getElementById("phone").addEventListener("keypress", function(e){
    if(e.key === "Enter") loginUser();
});

document.getElementById("password").addEventListener("keypress", function(e){
    if(e.key === "Enter") loginUser();
});
</script>

</body>
</html>
