<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joskev Loans - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef4ff,#f9fbff);
    padding:20px;
}

.card{
    width:100%;
    max-width:390px;
    background:#fff;
    padding:35px;
    border-radius:22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
    text-align:center;
}

.logo-box{
    width:60px;
    height:60px;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#22c55e);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:24px;
    font-weight:700;
    margin:auto;
    box-shadow:0 10px 25px rgba(37,99,235,.25);
}

.logo-title{
    margin-top:10px;
    font-size:22px;
    font-weight:700;
    color:#2563eb;
}

.logo-sub{
    font-size:12px;
    color:#6b7280;
    margin-bottom:22px;
}

h2{
    color:#111827;
    font-size:24px;
    margin-bottom:5px;
}

.welcome{
    color:#6b7280;
    font-size:13px;
    margin-bottom:20px;
}

.phone{
    display:flex;
    border:1px solid #e5e7eb;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:12px;
}

.prefix{
    background:#f3f4f6;
    padding:12px;
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:600;
}

.phone input{
    flex:1;
    border:none;
    outline:none;
    padding:12px;
    font-size:14px;
}

.password{
    width:100%;
    padding:12px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    outline:none;
    margin-bottom:10px;
    font-size:14px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    margin-bottom:16px;
}

.options a{
    color:#2563eb;
    text-decoration:none;
}

.login-btn{
    width:100%;
    border:none;
    padding:13px;
    border-radius:12px;
    background:linear-gradient(90deg,#2563eb,#22c55e);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.2);
}

.or{
    margin:18px 0 14px;
    color:#9ca3af;
    font-size:12px;
}

.social{
    display:flex;
    gap:10px;
}

.social button{
    flex:1;
    padding:11px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.google-btn{
    background:#fff;
    border:1px solid #dadce0;
    color:#3c4043;
}

.mpesa-btn{
    background:#00A651;
    border:none;
    color:#fff;
}

.signup{
    margin-top:18px;
    font-size:12px;
    color:#6b7280;
}

.signup a{
    color:#2563eb;
    font-weight:600;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo-box">J</div>

    <div class="logo-title">Joskev Loans</div>
    <div class="logo-sub">Your Financial Partner</div>

    <h2>Welcome Back 👋</h2>
    <div class="welcome">Login to your account to continue</div>

    <div class="phone">
        <div class="prefix">🇰🇪 +254</div>
        <input type="tel" placeholder="712 345 678" id="phone">
    </div>

    <input type="password" class="password" placeholder="Enter your password" id="password">

    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot Password?</a>
    </div>

    <!-- ✅ FIXED LOGIN BUTTON -->
    <button class="login-btn" onclick="loginUser()">
        🔒 Login
    </button>

    <div class="or">or continue with</div>

    <div class="social">
        <button class="google-btn">Google</button>
        <button class="mpesa-btn">M-PESA</button>
    </div>

    <div class="signup">
        Don't have an account?
        <a href="nextpage.html">Apply Now →</a>
    </div>

</div>

<!-- ✅ LOGIN SCRIPT -->
<script>
function loginUser() {

    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    if (!phone || !password) {
        alert("Please enter phone number and password");
        return;
    }

    // 🔥 FIX: use SAME KEYS as dashboard
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("userPhone", phone);
    localStorage.setItem("userName", phone); // or real name if you have it

    // optional: save password not needed (remove in real apps)
    
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
