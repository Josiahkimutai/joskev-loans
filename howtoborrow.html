<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Borrow - Joskev Loans</title>

<style>

/* BODY */
body{
    font-family:'Segoe UI', sans-serif;
    background:#f4f7fb;
    padding:60px 20px;
}

/* TITLE */
h2{
    text-align:center;
    font-size:38px;
    color:#0056d2;
    margin-bottom:40px;
}

/* STEPS CONTAINER */
.steps{
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

/* STEP CARD */
.step{
    background:white;
    width:300px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.3s;
}

.step:hover{
    transform:translateY(-8px);
}

/* NUMBER CIRCLE */
.number{
    width:60px;
    height:60px;
    background:#0056d2;
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    margin:0 auto 15px;
}

/* TITLE */
.step h3{
    color:#0056d2;
    margin-bottom:10px;
}

/* TEXT */
.step p{
    color:#555;
    line-height:1.6;
    font-size:15px;
}

/* MOBILE */
@media(max-width:700px){
    .step{
        width:100%;
    }
}

</style>
</head>

<body>

<h2>How to Borrow Money</h2>

<div class="steps">

<div class="step">
<div class="number">1</div>
<h3>Submit Application</h3>
<p>Fill in the online form with your personal details and loan request.</p>
</div>

<div class="step">
<div class="number">2</div>
<h3>Wait for Approval</h3>
<p>We review your application and make a decision within 15 minutes.</p>
</div>

<div class="step">
<div class="number">3</div>
<h3>Receive Money</h3>
<p>If approved, the loan is sent directly to your M-Pesa instantly.</p>
</div>

</div>

</body>
</html>
