<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile - Joskev Loans</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f8ff;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    color:#0056d2;
    margin-bottom:25px;
    text-align:center;
}

.profile-icon{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#eef4ff;
    color:#0056d2;
    font-size:45px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 25px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#444;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:.95;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    background:#555;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    margin-top:15px;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:green;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="profile-icon">
👤
</div>

<h1>My Profile</h1>

<div class="input-box">
<label>First Name</label>
<input type="text" id="firstName">
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="text" id="phone">
</div>

<div class="input-box">
<label>Email Address</label>
<input type="email" id="email">
</div>

<div class="input-box">
<label>ID Number</label>
<input type="text" id="idNumber">
</div>

<div class="input-box">
<label>Employment Status</label>
<input type="text" id="employment">
</div>

<div class="input-box">
<label>Monthly Income</label>
<input type="text" id="income">
</div>

<button onclick="saveProfile()">
Save Changes
</button>

<div class="message" id="message"></div>

<a href="dashboard.html" class="back-btn">
← Back to Dashboard
</a>

</div>

</div>

<script>

/* LOAD PROFILE */

document.getElementById("firstName").value =
localStorage.getItem("firstName") || "";

document.getElementById("phone").value =
localStorage.getItem("phone") || "";

document.getElementById("email").value =
localStorage.getItem("email") || "";

document.getElementById("idNumber").value =
localStorage.getItem("idNumber") || "";

document.getElementById("employment").value =
localStorage.getItem("employment") || "";

document.getElementById("income").value =
localStorage.getItem("income") || "";

/* SAVE PROFILE */

function saveProfile(){

    localStorage.setItem(
        "firstName",
        document.getElementById("firstName").value
    );

    localStorage.setItem(
        "phone",
        document.getElementById("phone").value
    );

    localStorage.setItem(
        "email",
        document.getElementById("email").value
    );

    localStorage.setItem(
        "idNumber",
        document.getElementById("idNumber").value
    );

    localStorage.setItem(
        "employment",
        document.getElementById("employment").value
    );

    localStorage.setItem(
        "income",
        document.getElementById("income").value
    );

    document.getElementById("message").innerHTML =
    "✅ Profile Updated Successfully";

}

</script>

</body>
</html>
