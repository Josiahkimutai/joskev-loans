<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing Loan - Joskev Loans</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
}

/* CARD */
.card{
    text-align:center;
    width:90%;
    max-width:500px;
}

/* LOGO */
.logo{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
    opacity:0.9;
}

/* SPINNER */
.loader{
    width:90px;
    height:90px;
    border:6px solid rgba(255,255,255,0.25);
    border-top:6px solid white;
    border-radius:50%;
    margin:0 auto 25px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* TITLE */
h1{
    font-size:34px;
    margin-bottom:10px;
}

/* TEXT */
p{
    font-size:16px;
    opacity:0.9;
    line-height:1.6;
}

/* STATUS BOX */
.status{
    margin-top:25px;
    background:rgba(255,255,255,0.15);
    padding:15px;
    border-radius:12px;
    font-size:14px;
}

/* DOT ANIMATION */
.dots::after{
    content:'';
    animation:dots 1.5s infinite;
}

@keyframes dots{
    0%{content:'';}
    33%{content:'.';}
    66%{content:'..';}
    100%{content:'...';}
}

/* PROGRESS BAR */
.progress-container{
    margin-top:25px;
    background:rgba(255,255,255,0.2);
    height:10px;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:white;
    animation:load 5s forwards;
}

@keyframes load{
    0%{width:0%;}
    100%{width:100%;}
}

/* MOBILE */
@media(max-width:500px){
    h1{
        font-size:26px;
    }
}

</style>
</head>

<body>

<div class="card">

<div class="logo">Joskev Loans</div>

<div class="loader"></div>

<h1>Processing Your Loan</h1>

<p>
Please wait while we verify your details and check your eligibility<span class="dots"></span>
</p>

<div class="status">
✔ Checking credit score<br>
✔ Verifying identity<br>
✔ Preparing M-Pesa disbursement
</div>

<div class="progress-container">
<div class="progress-bar"></div>
</div>

</div>

<script>
setTimeout(() => {
    window.location.href = "third.html";
}, 5000);
</script>

</body>
</html>
