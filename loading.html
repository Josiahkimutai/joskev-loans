<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing Loan - Joskev Loans</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0056d2,#003f9e);
    color:white;
}

/* CARD */
.card{
    text-align:center;
    width:90%;
    max-width:500px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

/* SPINNER */
.loader{
    width:90px;
    height:90px;
    border:6px solid rgba(255,255,255,0.25);
    border-top:6px solid white;
    border-radius:50%;
    margin:0 auto 25px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

h1{
    font-size:34px;
    margin-bottom:10px;
}

p{
    font-size:16px;
    opacity:0.9;
}

/* STATUS */
.status{
    margin-top:25px;
    background:rgba(255,255,255,0.15);
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">Joskev Loans</div>

<div class="loader"></div>

<h1>Processing Your Loan</h1>

<p>Please wait while we verify your details...</p>

<div class="status">
✔ Checking credit score<br>
✔ Verifying identity<br>
✔ Preparing M-Pesa disbursement
</div>

</div>

<!-- ✅ YOUR SCRIPT ADDED HERE -->
<script>
let phone = localStorage.getItem("phone");
let amount = localStorage.getItem("amount");

console.log("Phone:", phone);
console.log("Amount:", amount);
</script>

<!-- REDIRECT TO PAY PAGE -->
<script>
setTimeout(() => {
    window.location.href = "pay.html";
}, 5000);
</script>

</body>
</html>
